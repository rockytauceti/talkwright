<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>TalkWright Logo Concepts</title>
<style>
  body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #fff; display: flex; gap: 60px; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
  .option { display: flex; flex-direction: column; align-items: center; gap: 20px; }
  .label { font-size: 13px; color: #71717a; letter-spacing: 0.1em; text-transform: uppercase; }
  .name { font-size: 18px; font-weight: 600; color: #fff; }
  .sizes { display: flex; gap: 20px; align-items: center; }
  .size-label { font-size: 11px; color: #52525b; margin-top: 4px; text-align: center; }
  .bg-light { background: #fff; border-radius: 8px; padding: 8px; }
</style>
</head>
<body>

<!-- Option A: Illuminated T -->
<div class="option">
  <div class="label">Option A</div>
  <div class="name">Illuminated T</div>
  <div class="sizes">
    <!-- 64px -->
    <div>
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Outer ornamental ring, broken -->
        <circle cx="32" cy="32" r="28" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4 3" opacity="0.4"/>
        <!-- Corner diamond ornaments -->
        <path d="M32 6 L34 10 L32 14 L30 10 Z" fill="#f59e0b" opacity="0.7"/>
        <path d="M32 50 L34 54 L32 58 L30 54 Z" fill="#f59e0b" opacity="0.7"/>
        <path d="M6 32 L10 30 L14 32 L10 34 Z" fill="#f59e0b" opacity="0.7"/>
        <path d="M50 32 L54 30 L58 32 L54 34 Z" fill="#f59e0b" opacity="0.7"/>
        <!-- Crossbar of T with serifs -->
        <rect x="14" y="18" width="36" height="7" rx="1" fill="#f59e0b"/>
        <!-- Serif left -->
        <rect x="12" y="17" width="6" height="2" rx="0.5" fill="#f59e0b"/>
        <!-- Serif right -->
        <rect x="46" y="17" width="6" height="2" rx="0.5" fill="#f59e0b"/>
        <!-- Stem of T -->
        <rect x="28" y="25" width="8" height="22" rx="1" fill="#f59e0b"/>
        <!-- Serif bottom left -->
        <rect x="24" y="45" width="6" height="2" rx="0.5" fill="#f59e0b"/>
        <!-- Serif bottom right -->
        <rect x="34" y="45" width="6" height="2" rx="0.5" fill="#f59e0b"/>
        <!-- Tiny cross in center of crossbar -->
        <rect x="30.5" y="19.5" width="3" height="3" fill="#0a0a0a" opacity="0.4"/>
        <rect x="29" y="21" width="6" height="1" fill="#0a0a0a" opacity="0.2"/>
        <rect x="31.5" y="19" width="1" height="6" fill="#0a0a0a" opacity="0.2"/>
      </svg>
      <div class="size-label">64px</div>
    </div>
    <!-- 32px -->
    <div>
      <svg width="32" height="32" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="28" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4 3" opacity="0.4"/>
        <path d="M32 6 L34 10 L32 14 L30 10 Z" fill="#f59e0b" opacity="0.7"/>
        <path d="M32 50 L34 54 L32 58 L30 54 Z" fill="#f59e0b" opacity="0.7"/>
        <path d="M6 32 L10 30 L14 32 L10 34 Z" fill="#f59e0b" opacity="0.7"/>
        <path d="M50 32 L54 30 L58 32 L54 34 Z" fill="#f59e0b" opacity="0.7"/>
        <rect x="14" y="18" width="36" height="7" rx="1" fill="#f59e0b"/>
        <rect x="12" y="17" width="6" height="2" rx="0.5" fill="#f59e0b"/>
        <rect x="46" y="17" width="6" height="2" rx="0.5" fill="#f59e0b"/>
        <rect x="28" y="25" width="8" height="22" rx="1" fill="#f59e0b"/>
        <rect x="24" y="45" width="6" height="2" rx="0.5" fill="#f59e0b"/>
        <rect x="34" y="45" width="6" height="2" rx="0.5" fill="#f59e0b"/>
      </svg>
      <div class="size-label">32px</div>
    </div>
    <!-- 16px favicon -->
    <div>
      <svg width="16" height="16" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="14" y="18" width="36" height="7" rx="1" fill="#f59e0b"/>
        <rect x="28" y="25" width="8" height="22" rx="1" fill="#f59e0b"/>
        <rect x="24" y="45" width="6" height="2" rx="0.5" fill="#f59e0b"/>
        <rect x="34" y="45" width="6" height="2" rx="0.5" fill="#f59e0b"/>
      </svg>
      <div class="size-label">16px</div>
    </div>
    <!-- On white bg -->
    <div>
      <div class="bg-light">
        <svg width="40" height="40" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="32" cy="32" r="28" stroke="#d97706" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
          <path d="M32 6 L34 10 L32 14 L30 10 Z" fill="#d97706" opacity="0.8"/>
          <path d="M32 50 L34 54 L32 58 L30 54 Z" fill="#d97706" opacity="0.8"/>
          <path d="M6 32 L10 30 L14 32 L10 34 Z" fill="#d97706" opacity="0.8"/>
          <path d="M50 32 L54 30 L58 32 L54 34 Z" fill="#d97706" opacity="0.8"/>
          <rect x="14" y="18" width="36" height="7" rx="1" fill="#d97706"/>
          <rect x="12" y="17" width="6" height="2" rx="0.5" fill="#d97706"/>
          <rect x="46" y="17" width="6" height="2" rx="0.5" fill="#d97706"/>
          <rect x="28" y="25" width="8" height="22" rx="1" fill="#d97706"/>
          <rect x="24" y="45" width="6" height="2" rx="0.5" fill="#d97706"/>
          <rect x="34" y="45" width="6" height="2" rx="0.5" fill="#d97706"/>
        </svg>
      </div>
      <div class="size-label">on white</div>
    </div>
  </div>
</div>

<!-- Option B: Quill + Halo -->
<div class="option">
  <div class="label">Option B</div>
  <div class="name">Quill + Halo</div>
  <div class="sizes">
    <!-- 64px -->
    <div>
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Halo around tip -->
        <circle cx="22" cy="42" r="10" stroke="#f59e0b" stroke-width="1.5" opacity="0.35"/>
        <circle cx="22" cy="42" r="6" stroke="#f59e0b" stroke-width="1" opacity="0.25"/>
        <!-- Quill feather -->
        <path d="M52 8 C40 10 22 22 18 44" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" fill="none"/>
        <!-- Barbs on quill right side -->
        <path d="M52 8 C55 18 50 28 40 36" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
        <!-- Barbs detail lines -->
        <path d="M47 13 C49 17 46 22 42 26" stroke="#f59e0b" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
        <path d="M42 20 C44 24 42 29 38 33" stroke="#f59e0b" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
        <path d="M36 28 C38 31 36 35 33 38" stroke="#f59e0b" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
        <!-- Nib tip -->
        <path d="M18 44 L16 48 L20 46 Z" fill="#f59e0b"/>
        <!-- Ink dot -->
        <circle cx="17" cy="47" r="1.5" fill="#f59e0b" opacity="0.8"/>
      </svg>
      <div class="size-label">64px</div>
    </div>
    <!-- 32px -->
    <div>
      <svg width="32" height="32" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="22" cy="42" r="10" stroke="#f59e0b" stroke-width="1.5" opacity="0.35"/>
        <circle cx="22" cy="42" r="6" stroke="#f59e0b" stroke-width="1" opacity="0.25"/>
        <path d="M52 8 C40 10 22 22 18 44" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" fill="none"/>
        <path d="M52 8 C55 18 50 28 40 36" stroke="#f59e0b" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
        <path d="M18 44 L16 48 L20 46 Z" fill="#f59e0b"/>
      </svg>
      <div class="size-label">32px</div>
    </div>
    <!-- 16px -->
    <div>
      <svg width="16" height="16" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M52 8 C40 10 22 22 18 44" stroke="#f59e0b" stroke-width="3" stroke-linecap="round" fill="none"/>
        <path d="M52 8 C55 18 50 28 40 36" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.6"/>
        <circle cx="18" cy="45" r="4" stroke="#f59e0b" stroke-width="2" opacity="0.5"/>
      </svg>
      <div class="size-label">16px</div>
    </div>
    <!-- On white -->
    <div>
      <div class="bg-light">
        <svg width="40" height="40" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="22" cy="42" r="10" stroke="#d97706" stroke-width="1.5" opacity="0.35"/>
          <circle cx="22" cy="42" r="6" stroke="#d97706" stroke-width="1" opacity="0.25"/>
          <path d="M52 8 C40 10 22 22 18 44" stroke="#d97706" stroke-width="2" stroke-linecap="round" fill="none"/>
          <path d="M52 8 C55 18 50 28 40 36" stroke="#d97706" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
          <path d="M47 13 C49 17 46 22 42 26" stroke="#d97706" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
          <path d="M42 20 C44 24 42 29 38 33" stroke="#d97706" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
          <path d="M18 44 L16 48 L20 46 Z" fill="#d97706"/>
        </svg>
      </div>
      <div class="size-label">on white</div>
    </div>
  </div>
</div>

</body>
</html>
